name: Build chess game theory textbook

on:
  pull_request:
    branches:
      - main
    paths:
      - 'generated/chess-textbook/**'
      - '.github/workflows/chess-textbook.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: chess-textbook-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply permanent source and layout QA fixes
        run: |
          python3 - <<'PY'
          from pathlib import Path

          root = Path('generated/chess-textbook')

          # Generic list fix: next-line descriptions need a positive margin.
          for path in root.glob('*.tex'):
              text = path.read_text(encoding='utf-8')
              text = text.replace(
                  r'\begin{description}[style=nextline,leftmargin=0pt]',
                  r'\begin{description}[style=nextline,leftmargin=2.4em,labelsep=.5em]'
              )
              path.write_text(text, encoding='utf-8')

          edits = {
              root / 'main.tex': [
                  (
                      'outer=0.68in,headheight=15pt',
                      'outer=0.68in,headheight=22pt'
                  ),
                  (
                      r'\usepackage{caption}',
                      r'\usepackage[hypcap=false]{caption}'
                  ),
                  (
                      r'\fancyhead[L]{\small\sffamily\color{Navy}\nouppercase{\leftmark}}',
                      r'\fancyhead[L]{\footnotesize\sffamily\color{Navy}\nouppercase{\leftmark}}'
                  ),
                  (
                      r'{\titlerule[0.8pt]\vspace{0.8ex}\Huge\bfseries\color{Navy}}',
                      r'{\titlerule[0.8pt]\vspace{0.8ex}\huge\bfseries\color{Navy}\raggedright}'
                  ),
                  (
                      r'{\Huge\bfseries\color{Navy}}',
                      r'{\huge\bfseries\color{Navy}\raggedright}'
                  ),
              ],
              root / 'frontmatter.tex': [
                  (
                      r'\begin{longtable}{p{.27\textwidth}p{.29\textwidth}p{.36\textwidth}}',
                      r'\begin{longtable}{@{}p{.25\textwidth}p{.28\textwidth}p{.34\textwidth}@{}}'
                  ),
              ],
              root / 'part3.tex': [
                  (
                      'where $\\lambda$ rises as clock time becomes scarce.\n\\]\nThe expression is conceptual:',
                      'where $\\lambda$ rises as clock time becomes scarce.\nThe expression is conceptual:'
                  ),
              ],
              root / 'part5.tex': [
                  (
                      'and $R$ is execution and refutation risk.\n\\]\nA forcing mate has little discount.',
                      'and $R$ is execution and refutation risk.\nA forcing mate has little discount.'
                  ),
              ],
              root / 'part6.tex': [
                  (
                      r'\begin{longtable}{p{.07\textwidth}p{.23\textwidth}p{.28\textwidth}p{.31\textwidth}}',
                      r'\begin{longtable}{@{}p{.06\textwidth}p{.21\textwidth}p{.27\textwidth}p{.34\textwidth}@{}}'
                  ),
              ],
              root / 'appendices.tex': [
                  (
                      '\\begin{tabular}{lccl}\n\\toprule\nPiece & Common prior & Main strength & Main dependence\\\\\n\\midrule',
                      '\\begin{tabularx}{.94\\textwidth}{p{.13\\textwidth}p{.16\\textwidth}YY}\n\\toprule\nPiece & Common prior & Main strength & Main dependence\\\\\n\\midrule'
                  ),
                  (
                      '\\end{tabular}\n\\end{center}\n\nThese are priors, not exchange commands.',
                      '\\end{tabularx}\n\\end{center}\n\nThese are priors, not exchange commands.'
                  ),
                  (
                      r'\begin{tabularx}{\linewidth}{p{.08\linewidth}YYY}',
                      r'\begin{tabularx}{\linewidth}{p{.14\linewidth}YYY}'
                  ),
              ],
          }

          for path, replacements in edits.items():
              text = path.read_text(encoding='utf-8')
              for old, new in replacements:
                  text = text.replace(old, new)
              path.write_text(text, encoding='utf-8')
          PY

      - name: Commit normalized source to build branch
        if: github.event_name == 'pull_request'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add generated/chess-textbook/*.tex
          if ! git diff --cached --quiet; then
            git commit -m 'Apply final LaTeX typography fixes [skip ci]'
            git push origin HEAD:${{ github.head_ref }}
          fi

      - name: Compile with XeLaTeX
        id: compile
        continue-on-error: true
        uses: xu-cheng/latex-action@v4
        with:
          root_file: main.tex
          working_directory: generated/chess-textbook
          latexmk_use_xelatex: true
          os: debian
          extra_system_packages: fonts-dejavu-core

      - name: Collect compiler diagnostics
        if: always()
        run: |
          mkdir -p build-diagnostics
          if [ -f generated/chess-textbook/main.log ]; then
            cp generated/chess-textbook/main.log build-diagnostics/main.log
            tail -n 220 generated/chess-textbook/main.log > build-diagnostics/compile-tail.txt
            grep -E 'Missing character|Overfull \\hbox|Overfull \\vbox|Package .* Warning|Output written' generated/chess-textbook/main.log > build-diagnostics/qa-summary.txt || true
            python3 - <<'PY'
          from pathlib import Path
          import re

          log = Path('generated/chess-textbook/main.log').read_text(encoding='utf-8', errors='replace').splitlines()
          current = 'main.tex'
          output = []
          markers = ('Missing character', 'Overfull \\hbox', 'Overfull \\vbox', 'Negative labelwidth')
          for index, line in enumerate(log):
              matches = re.findall(r'\((?:\./)?([^()\s]+\.tex)', line)
              if matches:
                  current = matches[-1]
              if any(marker in line for marker in markers):
                  output.append(f'{current}: {line}')
                  for continuation in log[index + 1:index + 3]:
                      output.append(f'    {continuation}')
          Path('build-diagnostics/qa-context.txt').write_text('\n'.join(output) + ('\n' if output else 'No clipping-class warnings found.\n'), encoding='utf-8')
          PY
          else
            printf 'No main.log was produced.\n' > build-diagnostics/compile-tail.txt
            cp build-diagnostics/compile-tail.txt build-diagnostics/qa-summary.txt
            cp build-diagnostics/compile-tail.txt build-diagnostics/qa-context.txt
          fi

      - name: Upload compiler diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Thinking-in-Chess-Diagnostics
          path: build-diagnostics/
          if-no-files-found: error

      - name: Publish concise diagnostic to build branch
        if: always() && github.event_name == 'pull_request'
        run: |
          mkdir -p build-reports
          cp build-diagnostics/compile-tail.txt build-reports/chess-compile-tail.txt
          cp build-diagnostics/qa-summary.txt build-reports/chess-qa-summary.txt
          cp build-diagnostics/qa-context.txt build-reports/chess-qa-context.txt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add build-reports/chess-compile-tail.txt build-reports/chess-qa-summary.txt build-reports/chess-qa-context.txt
          if ! git diff --cached --quiet; then
            git commit -m 'Publish chess compiler diagnostic [skip ci]'
            git push origin HEAD:${{ github.head_ref }}
          fi

      - name: Enforce clipping-free layout
        run: |
          if grep -Eq 'Missing character|Overfull \\hbox|Overfull \\vbox|Negative labelwidth' generated/chess-textbook/main.log; then
            echo 'Layout QA found clipping-class warnings. See chess-qa-context.txt.'
            exit 1
          fi

      - name: Verify compiled PDF exists
        run: test -f generated/chess-textbook/main.pdf

      - name: Name the finished book
        run: cp generated/chess-textbook/main.pdf generated/chess-textbook/Thinking_in_Chess.pdf

      - name: Package editable LaTeX source
        run: |
          python3 - <<'PY'
          from pathlib import Path
          from zipfile import ZIP_DEFLATED, ZipFile

          root = Path('generated/chess-textbook')
          output = root / 'Thinking_in_Chess_LaTeX.zip'
          excluded_names = {
              'BUILD_REQUEST.md',
              'Thinking_in_Chess.pdf',
              'Thinking_in_Chess_LaTeX.zip',
              'main.pdf',
          }
          excluded_suffixes = {
              '.aux', '.fdb_latexmk', '.fls', '.log', '.out', '.toc',
              '.lof', '.lot', '.xdv', '.synctex.gz'
          }

          with ZipFile(output, 'w', compression=ZIP_DEFLATED) as archive:
              for path in sorted(root.rglob('*')):
                  if not path.is_file() or path.name in excluded_names:
                      continue
                  if any(path.name.endswith(suffix) for suffix in excluded_suffixes):
                      continue
                  relative = path.relative_to(root)
                  archive.write(path, Path('Thinking_in_Chess_LaTeX') / relative)
          PY

      - name: Upload PDF and source artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Thinking-in-Chess-Deliverables
          path: |
            generated/chess-textbook/Thinking_in_Chess.pdf
            generated/chess-textbook/Thinking_in_Chess_LaTeX.zip
          if-no-files-found: error

      - name: Publish direct-download deliverables to build branch
        if: github.event_name == 'pull_request'
        run: |
          git add generated/chess-textbook/Thinking_in_Chess.pdf generated/chess-textbook/Thinking_in_Chess_LaTeX.zip
          if ! git diff --cached --quiet; then
            git commit -m 'Publish Thinking in Chess deliverables [skip ci]'
            git push origin HEAD:${{ github.head_ref }}
          fi
