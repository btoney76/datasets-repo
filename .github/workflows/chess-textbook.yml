name: Build chess game theory textbook

on:
  pull_request:
    branches:
      - main
    paths:
      - 'generated/chess-textbook/**'
      - '.github/workflows/chess-textbook.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: chess-textbook-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Normalize two display-math closers
        run: |
          python3 - <<'PY'
          from pathlib import Path

          replacements = {
              Path('generated/chess-textbook/part3.tex'): [
                  (
                      'where $\\lambda$ rises as clock time becomes scarce.\n\\]\nThe expression is conceptual:',
                      'where $\\lambda$ rises as clock time becomes scarce.\nThe expression is conceptual:'
                  )
              ],
              Path('generated/chess-textbook/part5.tex'): [
                  (
                      'and $R$ is execution and refutation risk.\n\\]\nA forcing mate has little discount.',
                      'and $R$ is execution and refutation risk.\nA forcing mate has little discount.'
                  )
              ],
          }

          for path, edits in replacements.items():
              text = path.read_text(encoding='utf-8')
              for old, new in edits:
                  text = text.replace(old, new)
              path.write_text(text, encoding='utf-8')
          PY

      - name: Compile with XeLaTeX
        id: compile
        continue-on-error: true
        uses: xu-cheng/latex-action@v4
        with:
          root_file: main.tex
          working_directory: generated/chess-textbook
          latexmk_use_xelatex: true
          os: debian
          extra_system_packages: fonts-dejavu-core

      - name: Collect compiler diagnostics
        if: always()
        run: |
          mkdir -p build-diagnostics
          if [ -f generated/chess-textbook/main.log ]; then
            cp generated/chess-textbook/main.log build-diagnostics/main.log
            tail -n 220 generated/chess-textbook/main.log > build-diagnostics/compile-tail.txt
          else
            printf 'No main.log was produced.\n' > build-diagnostics/compile-tail.txt
          fi

      - name: Upload compiler diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Thinking-in-Chess-Diagnostics
          path: build-diagnostics/
          if-no-files-found: error

      - name: Publish concise diagnostic to build branch
        if: always() && github.event_name == 'pull_request'
        run: |
          mkdir -p build-reports
          cp build-diagnostics/compile-tail.txt build-reports/chess-compile-tail.txt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add build-reports/chess-compile-tail.txt
          if ! git diff --cached --quiet; then
            git commit -m 'Publish chess compiler diagnostic [skip ci]'
            git push origin HEAD:${{ github.head_ref }}
          fi

      - name: Verify compiled PDF exists
        run: test -f generated/chess-textbook/main.pdf

      - name: Name the finished book
        run: cp generated/chess-textbook/main.pdf generated/chess-textbook/Thinking_in_Chess.pdf

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: Thinking-in-Chess-PDF
          path: generated/chess-textbook/Thinking_in_Chess.pdf
          if-no-files-found: error
